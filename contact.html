<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Lasting Wake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        @media (max-width: 560px) {
            .form-row { grid-template-columns: 1fr; }
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .form-group input,
        .form-group textarea {
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.12);
            background: rgba(255, 255, 255, 0.85);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
        }
        .form-submit {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .form-submit a {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }
        .form-submit a:hover {
            color: var(--accent-blue);
        }
        #form-success {
            display: none;
            text-align: center;
            padding: 2.5rem;
            background: rgba(0, 180, 216, 0.08);
            border: 1px solid rgba(0, 180, 216, 0.25);
            border-radius: 16px;
            color: var(--text-main);
        }
        #form-success p:first-child {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <!-- Home Link -->
    <a href="index.html" class="home-link">The Lasting Wake</a>

    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <nav class="about-drawer" id="about-drawer">
        <a href="index.html" class="drawer-home-icon" aria-label="Home">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        <button class="close-drawer" id="close-drawer" aria-label="Close Menu">&times;</button>
        <div class="drawer-content">
            <ul class="drawer-nav">
                <li><a href="about.html" class="drawer-link">About</a></li>
                <li><a href="publications.html" class="drawer-link">Publications</a></li>
                <li><a href="expertise.html" class="drawer-link">Expertise</a></li>
                <li><a href="contact.html" class="drawer-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="page-content" style="max-width: 680px;">
        <h1 class="page-title">Contact</h1>
        <p class="page-subtitle" style="font-size: 1.2rem;">Let's build something that matters.</p>

        <div class="text-block">
            <div style="background: rgba(255,255,255,0.55); border-radius: 20px; border: 1px solid var(--glass-border); padding: 2.5rem;">

                <div id="contact-form-wrap">
                    <!-- Replace YOUR_FORM_ID with your Formspree form ID after signing up at formspree.io -->
                    <form class="contact-form" action="https://formspree.io/f/xojpqkkg" method="POST" id="contact-form">

                        <input type="hidden" name="_subject" value="New message from thelastingwake.com">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="first-name">First Name</label>
                                <input type="text" id="first-name" name="first_name" placeholder="Jane" required>
                            </div>
                            <div class="form-group">
                                <label for="last-name">Last Name</label>
                                <input type="text" id="last-name" name="last_name" placeholder="Smith" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="jane@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" placeholder="Tell me about your project or idea..." required></textarea>
                        </div>

                        <div class="form-submit">
                            <a href="mailto:markrubin@thelastingwake.com">or email directly &rarr;</a>
                            <button type="submit" class="btn" style="padding: 0.9rem 2rem; font-size: 1rem; color: #000; border: none; cursor: pointer;">Send Message &rarr;</button>
                        </div>
                    </form>
                </div>

                <div id="form-success">
                    <p>Message sent.</p>
                    <p style="color: var(--text-muted); font-size: 0.95rem;">Thanks for reaching out — I'll get back to you soon.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 The Lasting Wake. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        if (form) {
            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                const data = new FormData(form);
                const res = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
                if (res.ok) {
                    document.getElementById('contact-form-wrap').style.display = 'none';
                    document.getElementById('form-success').style.display = 'block';
                } else {
                    alert('Something went wrong. Please email markrubin@thelastingwake.com directly.');
                }
            });
        }
    </script>
</body>

</html>
